name: Java CI with Gradle

run-name: ${{ inputs.orchestrator_run_suffix && format('Java CI with Gradle - {0}', inputs.orchestrator_run_suffix) || github.workflow }}
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      enterprise_version:
        description: Specmatic enterprise version under test
        required: false
        type: string
      enterprise_artifact_url:
        description: Specmatic Enterprise jar/artifact URL under test
        required: false
        type: string
      orchestrator_run_suffix:
        description: Test orchestrator run suffix
        required: false
        type: string

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CTRF_RESULT_PATH: "build/reports/specmatic/grpc/test/ctrf/*.json"

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'true'

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@417ae3ccd767c252f5661f1ace9f835f9654f2b5 # v3.1.0

    - name: Save Specmatic license
      if: github.ref == 'refs/heads/main'
      run: |
        mkdir -p ~/.specmatic
        echo "${{ secrets.SPECMATIC_LICENSE_KEY }}" > ~/.specmatic/specmatic-license.txt

    # Start: internal setup required by Specmatic. Sample project users can ignore this block.
    - if: ${{ inputs.orchestrator_run_suffix != '' }}
      uses: specmatic/specmatic-github-workflows/action-orchestrator-setup@main
      with:
        orchestrator-run-suffix: ${{ inputs.orchestrator_run_suffix }}
        enterprise-version: ${{ inputs.enterprise_version }}
        gradle-snapshot-init-script-path: ./gradle/specmatic-snapshots.init.gradle
        docker-hub-username: ${{ vars.SPECMATIC_DOCKER_HUB_USERNAME }}
        docker-hub-token: ${{ secrets.SPECMATIC_DOCKER_HUB_TOKEN }}
        setup-snapshot-docker-image: 'true'
    # End: internal setup required by Specmatic.

    - name: Build with Gradle Wrapper
      env:
        ENTERPRISE_VERSION: ${{ inputs.enterprise_version }}
      run: |
        ./gradlew clean test \
          ${ENTERPRISE_VERSION:+-PspecmaticEnterpriseVersion=${ENTERPRISE_VERSION}}

    - name: Upload CTRF Report
      uses: actions/upload-artifact@v6
      if: always() # Run even if tests fail
      with:
        name: ctrf-report
        path: ${{ env.CTRF_RESULT_PATH }}
        retention-days: 5

    # Display CTRF test results
    - name: Publish Test Results
      uses: ctrf-io/github-test-reporter@v1
      if: always() # Run even if tests fail
      with:
        report-path: ${{ env.CTRF_RESULT_PATH }}

    - name: Publish Build Reports to Specmatic Insights
      if: ${{ github.ref == 'refs/heads/main' && inputs.orchestrator_run_suffix == '' }}
      run: |
        docker run \
          --rm \
          -e GIT_DISCOVERY_ACROSS_FILESYSTEM=1 \
          -e GIT_CONFIG_COUNT=1 \
          -e GIT_CONFIG_KEY_0=safe.directory \
          -e GIT_CONFIG_VALUE_0=/workspace \
          -v "${HOME}/.specmatic:/root/.specmatic:ro" \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          specmatic/enterprise \
          send-report \
          --metadata build_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
          --branch-name ${{ github.ref_name }} \
          --repo-name ${{ github.event.repository.name }} \
          --repo-id ${{ github.repository_id }} \
          --repo-url ${{ github.event.repository.html_url }}
